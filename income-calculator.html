  return KMG_KEYWORDS.some(k => l.includes(k));
}
function getRate(groupSize) {
  if (groupSize <= 3)  return 400000;
  if (groupSize <= 19) return 200000;
  return 100000;
}
function fmt(n) { return n.toLocaleString('ru-RU') + ' ₸'; }
function fmtDate(d) {
  const [y,m,day] = d.split('-');

const STORAGE_KEY = 'vaibu_sessions_v1';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ sessions, nextId }));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.sessions) sessions = data.sessions;
    if (data.nextId)   nextId   = data.nextId;
  } catch(e) {}
}

function resetToDefault() {
  if (!confirm('Сбросить все изменения и вернуть исходные данные?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

let nextId = 10;
let openId = null;
load();

// ─── calc ────────────────────────────────────────────────────────────────────

function sessionIncome(s) {
  const total = s.participants.length;
  const rate  = getRate(total);
  return s.participants.reduce((sum, p) => sum + (p.kmg ? 100000 : rate), 0);
}

// ─── render ──────────────────────────────────────────────────────────────────

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  let totalPax = 0, totalIncome = 0;

  sessions.forEach(s => {
    const n      = s.participants.length;
    const income = sessionIncome(s);
    const rate   = getRate(n);
    totalPax    += n;
    totalIncome += income;

    const isOpen = openId === s.id;

    const companyTags = s.companies.map(c =>
      `<span class="tag ${isKMG(c)?'tag-kmg':'tag-other'}">${isKMG(c)?'★ ':''}${c}</span>`
    ).join(' ');

    const kmgCount    = s.participants.filter(p=>p.kmg).length;
    const nonKmgCount = n - kmgCount;
    let rateParts = [];
    if (kmgCount > 0)    rateParts.push(`${kmgCount}×100k`);
    if (nonKmgCount > 0) rateParts.push(`${nonKmgCount}×${rate/1000}k`);
    const rateHint = rateParts.join(' + ') || '—';

    // session row
    const tr = document.createElement('tr');
    tr.className = `session-row${isOpen?' open':''}`;
    tr.dataset.id = s.id;
    tr.innerHTML = `
      <td style="padding:10px 14px;"><span class="chevron">▶</span></td>
      <td class="date-cell" style="padding:10px 14px;">${fmtDate(s.date)}${weekTag(s.date)}</td>
      <td class="companies-cell" style="padding:10px 14px;">${companyTags}</td>
      <td class="pax-count" style="padding:10px 14px;">${n} чел.</td>
      <td class="rate-hint" style="padding:10px 14px;">${rateHint}</td>
      <td class="income-cell" style="padding:10px 14px;">${fmt(income)}</td>
      <td style="padding:10px 8px;"><button class="btn-del-session" onclick="deleteSession(event,${s.id})">✕</button></td>
    `;
    tr.addEventListener('click', () => toggleOpen(s.id));
    tbody.appendChild(tr);

    // expand row
    const expandTr = document.createElement('tr');
    expandTr.className = 'expand-row';
    expandTr.dataset.expand = s.id;
    const expandTd = document.createElement('td');
    expandTd.colSpan = 7;

    const panel = document.createElement('div');
    panel.className = `expand-panel${isOpen?' visible':''}`;
    panel.innerHTML = buildPanel(s);
    expandTd.appendChild(panel);
    expandTr.appendChild(expandTd);
    tbody.appendChild(expandTr);
  });

  document.getElementById('total-pax').textContent = totalPax + ' чел.';
  const g = fmt(totalIncome);
  document.getElementById('grand-total').textContent = g;
  document.getElementById('grand-total-header').textContent = g;
}

function buildPanel(s) {
  const n    = s.participants.length;
  const rate = getRate(n);

  const compOpts = s.companies.map(c => `<option value="${esc(c)}">`).join('');

  let cards = '';
  if (n === 0) {
    cards = '<p class="pax-empty">Участники ещё не добавлены — используйте форму ниже.</p>';
  } else {
    cards = '<div class="pax-grid">' +
      s.participants.map((p, i) => {
        const r = p.kmg ? 100000 : rate;
        return `
          <div class="pax-card${p.kmg ? ' kmg-card' : ''}">
            <div class="pax-info">
              <div class="pax-num"># ${i + 1}</div>
              <input class="pax-input name-input"
                type="text"
                placeholder="ФИО"
                value="${esc(p.name)}"
                onchange="updatePax(${s.id},${i},'name',this.value)"
                onclick="stopProp(event)">
              <input class="pax-input comp-input"
                type="text"
                list="comp-list-${s.id}"
                placeholder="Место работы"
                value="${esc(p.company)}"
                onchange="updatePax(${s.id},${i},'company',this.value)"
                onclick="stopProp(event)">
              <input class="pax-input role-input"
                type="text"
                placeholder="Должность"
                value="${esc(p.role||'')}"
                onchange="updatePax(${s.id},${i},'role',this.value)"
                onclick="stopProp(event)">
            </div>
            <div class="pax-right">
              <div class="pax-rate${p.kmg ? ' kmg-rate' : ''}">${fmt(r)}</div>
              <input type="checkbox" class="pax-kmg-toggle" title="КМГ"
                ${p.kmg ? 'checked' : ''}
                onchange="updatePax(${s.id},${i},'kmg',this.checked)"
                onclick="stopProp(event)">
              <button class="btn-del-pax" onclick="delParticipant(event,${s.id},${i})">✕</button>
            </div>
          </div>`;
      }).join('') + `</datalist></div>`;
  }

  const opts = s.companies.map(c =>
    `<option value="${esc(c)}">`
  ).join('');

  return `
    <datalist id="comp-list-${s.id}">${opts}</datalist>
    ${cards}
    <div class="add-pax-form" onclick="stopProp(event)">
      <div class="field">
        <label>ФИО</label>
        <input type="text" id="pname-${s.id}" placeholder="Алия Сейткали">
      </div>
      <div class="field">
        <label>Место работы</label>
        <input type="text" id="pcomp-${s.id}" list="comp-list-${s.id}"
          placeholder="${esc(s.companies[0] || '')}" value="${esc(s.companies[0] || '')}">
      </div>
      <div class="field">
        <label>Должность</label>
        <input type="text" id="prole-${s.id}" placeholder="Заместитель директора">
      </div>
      <label class="kmg-check">
        <input type="checkbox" id="pkmg-${s.id}" ${isKMG(s.companies[0] || '') ? 'checked' : ''}>
        КМГ
      </label>
      <button class="btn-sm" onclick="addParticipant(event,${s.id})">+ Добавить</button>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stopProp(e) { e.stopPropagation(); }

// ─── interactions ─────────────────────────────────────────────────────────────

function toggleOpen(id) {
  openId = (openId === id) ? null : id;
  render();
  if (openId) {
    // scroll into view
    setTimeout(() => {
      const el = document.querySelector(`[data-expand="${openId}"]`);
      if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

function addParticipant(e, sid) {
  e.stopPropagation();
  const s    = sessions.find(x => x.id === sid);
  const name = document.getElementById(`pname-${sid}`).value.trim();
  const comp = document.getElementById(`pcomp-${sid}`).value.trim() || (s.companies[0]||'');
  const role = document.getElementById(`prole-${sid}`).value.trim();
  const kmg  = document.getElementById(`pkmg-${sid}`).checked;
  s.participants.push({name, company: comp, role, kmg: kmg || isKMG(comp)});
  document.getElementById(`prole-${sid}`).value = '';
  save(); render();
}

function updatePax(sid, idx, field, value) {
  const s = sessions.find(x => x.id === sid);
  if (!s) return;
  s.participants[idx][field] = value;
  if (field === 'company') s.participants[idx].kmg = isKMG(value);
  save();
  renderTotals();
  if (field === 'company' || field === 'kmg') render();
}

function renderTotals() {
  let totalPax = 0, totalIncome = 0;
  sessions.forEach(s => {
    totalPax += s.participants.length;
    totalIncome += sessionIncome(s);
  });
  document.getElementById('total-pax').textContent = totalPax + ' чел.';
  const g = fmt(totalIncome);
  document.getElementById('grand-total').textContent = g;
  document.getElementById('grand-total-header').textContent = g;
}

function delParticipant(e, sid, idx) {
  e.stopPropagation();
  const s = sessions.find(x => x.id === sid);
  s.participants.splice(idx, 1);
  save(); render();
}

function deleteSession(e, sid) {
  e.stopPropagation();
  if (!confirm('Удалить сессию?')) return;
  sessions = sessions.filter(x => x.id !== sid);
  if (openId === sid) openId = null;
  save(); render();
}

function addSession() {
  const dateVal = document.getElementById('new-date').value;
  const compVal = document.getElementById('new-companies').value.trim();
  if (!dateVal || !compVal) { alert('Заполните дату и компании.'); return; }
  const companies = compVal.split(',').map(c=>c.trim()).filter(Boolean);
  sessions.push({id: nextId++, date: dateVal, companies, participants: []});
  sessions.sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('new-companies').value = '';
  save(); render();
}

// sync КМГ checkbox when company input changes
document.addEventListener('input', e => {
  const m = e.target.id && e.target.id.match(/^pcomp-(\d+)$/);
  if (m) {
    const sid = parseInt(m[1]);
    const cb  = document.getElementById(`pkmg-${sid}`);
    if (cb) cb.checked = isKMG(e.target.value);
  }
});

render();
</script>
</body>
</html>
